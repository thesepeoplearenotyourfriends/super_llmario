<!-- Super LLMario project primer / scratchpad:

** DO NOT DELETE THIS TEXT. **

CURRENT KNOWN-GOOD BASELINE:
Treat "super_llmario_toybox_cart_v67_bonk_box_contract.htmlz" as the current keeper after the row-camera latched seam, solid image-sprite platform patches, bonk-box contract cleanup, and v74 solid-sprite underside guard plus image slope skins, and v75 bustable floating blocks; v76 mushroom powerup emergence/slope awareness. v69 fixed slope-to-flat handoff; v70 prevents top-contact horizontal side correction during jump frames at flat-to-slope seams. v66 is the solid image-sprite keeper; v65 is the row-camera keeper baseline; v62 remains the stable asset/cart loader baseline.

v68 added first-pass local-row slope platforms (up/down); v69 fixes the slope-to-flat handoff seam on steeper ramps while keeping v67 bonk-box behavior; v70 fixes the flat-to-slope seam jump teleport; v71 fixes steep slope-to-flat walking/running exit pause; v72 guards bonk boxes against seam-jump side-overlap false bonks; v74 extends the true-underside rule to solid image sprites and rectangular platforms; v75 adds cartridge-toggled bustable/breakable floating blocks with shard animation; v76 makes mushroom powerups row-aware, adds a simple emergence phase, ignores the source block briefly, and lets mushrooms ride existing slope platforms; v77 supports the split source model: load .llmtheme.txt and .llmmap.txt as two documents, combining them in memory without turning maps back into base64 asset carts; v78 makes theme-truth image assets draw as their original sprites while collision truth handles physics, including line/slope truth.

v79 stops demo resourceScenery trees/shrubs/mushrooms from leaking into loaded maps.

v83 adds first-pass global ladder/climb-zone physics: maps can place ladder/vine climbables with engine fallback art or theme skins; up/down climbs, jump detaches.
v84 smooths ladder seams by merging/treating touching climb-zone pieces as one climb column, so stacked ladder/vine pieces do not clamp-stop at joins.

v85 adds global pipe/tube support as an engine noun: maps can place solid green fallback pipes, themes can still skin later, and optional JSON targets can make down-press pipe travel.

v67 keeps v66 behavior and makes the existing bonk block vocabulary cartridge/theme-friendly: floating blocks may declare boxKind/kind, payload/contents, usedStyle/usedRecipe/usedImage, oneShot info behavior, and imageBlock/usedBlock recipes. Reward boxes can emit coin bursts or the existing mushroom powerup without hardcoding theme art. Floating blocks may also opt into busting with bustable:true/breakable:true and optional requiresBig:true.

v66 adds optional solid image sprites for asset-backed cartridges. Resource scenery sprites marked solid:true now participate in collision using their rendered image rectangle, so platform-looking PNG/SVG pieces do not accidentally behave like background decoration.

v65 keeps the row-camera latched seam as the first successful row transition implementation: falling across a row boundary latches the target row, gives a short readable seam pause, pans the camera, then releases the fall without old/new row bounce.

v63 adds an optional row-aware camera experiment for carts that define world.rows, including a brief fall-stall while the camera pans down to the next row. Carts without rows should keep the v62 side-scroller camera behavior.

v62 tightens the image-cartridge hooks after the first Jungle/BrownNature visual test: image tile platforms can paint a backing color and overdraw seams so transparent tile gutters do not reveal sky, and themed sign recipes get readable light text without mutating the classic physics-test level.

v60 adds a conservative load-time placement normalizer for external cartridges: surface props such as pipes/trees/shrubs/mushrooms/arrow signs are snapped to nearby walking surfaces, impossible scenery over chasms is dropped unless marked anchor:"raw", solid pipe collision follows the corrected pipe base, and floating blocks are forced into either ground-block placement or big-hero-safe overhead clearance.

v59 fixes the final 1-1 scenery nit: the later tree near x≈3080/3208 now has its base raised so the trunk reads above the grass/ledge. Rest of World 1 is intended to live as external .llmcart cartridge files, not embedded in the engine.

v58 raises the two too-low second-half block pairs so the hero can pass underneath, adds a tap-to-read map coordinate probe in the lower corner, shifts the arrow triangles right so their visual weight is centered, and drops the first decorative mushroom onto the grass.

v57 fixes the sign/mushroom polish nibs and extends built-in 1-1 into a longer second half with extra platforms, coins, enemies, scenery, and a later portal.

v56 fixes the follow-up polish misses: arrow signs now point right, the decorative red mushroom recipe gets a visible stem, and the hero ground shadow no longer follows jumps.

v55 refines the built-in 1-1 cart presentation: removes the confusing starting pipe, gives arrow signs a more balanced double-chevron face, and lifts the small red mushroom so it reads as a mushroom instead of a speckled rock.

v54 is the v53 merged baseline plus built-in 1-1 scenery cleanup: pipes/arches anchored to platforms, pipes optionally solid, and shrubs moved into cartridge data.

v53 is the merged baseline containing:

* v46 milestone systems: SFX/audio path, gamepad Learn, pause/status-bar menu, mobile display fixes, working counters/HUD, no onscreen mobile buttons.
* v52 visual systems: mushroom-cap hero, improved grass/dirt blend, attribution pager, EPS-derived scenery/prefab math.
* v53 external cartridge loader: Load Cartridge in pause menu; supports ".llmcart.txt", ".llmcart", ".json", ".txt".

FILE-SHARING RULE:
Never provide ".html" files to the user. Always provide ".htmlz" links unless explicitly asked otherwise. The ChatGPT UI can inline-run/display ".html" files, which is unwanted. Use ".htmlz" for one-file HTML apps. If internal testing needs a temporary ".html", prefer "/tmp", not "/mnt/data", so it does not become a user-visible uploaded file.

PROJECT DIRECTION:
Retro charming does not mean technically primitive. Do not force era-accurate 1987 pixel-art limitations. Aim for toybox / N64-ish / modern-retro charm: gradients, rounded shapes, soft lighting, particles, squash/stretch, parallax, glow, richer tiles, expressive backgrounds, and modern UI polish, while keeping chunky silhouettes, readable sprites, side-scroller composition, tile-world logic, limited-ish palettes, and playful iconography.

This is a personal/offline-friendly weird game/art/tool project. Do not frame it as shipping, app stores, public users, adoption, or team collaboration.

CURRENT ARCHITECTURE:
Use the recipe-cartridge split.

The engine owns durable functionality:

* input actions and keyboard/gamepad polling
* gamepad Learn UI and saved mappings
* pause/status-bar menu
* audio context / RetroCharm SFX path
* physics, collision, camera, update/render loop
* entity behavior: enemies, powerups, blocks, portal, player states
* recipe dispatch
* reusable drawing primitives and prefabs
* HUD behavior, overlays, panels, attributions UI
* external cartridge loading/normalization/validation

The cartridge owns reproducible/changeable world content:

* title, HUD label text, messages
* world dimensions and player spawn
* platform layout
* floating blocks and block contents
* coins, stars, enemies, signs, portal
* theme data
* drawing recipes
* optional audio overrides
* optional resource/attribution records
* optional decorative "resourceScenery"

The boundary is practical, not purist. The engine can include rich drawing functions/prefabs such as mushroom mascot, blob, portal, coin, star, grass platform, rounded block, HUD panel, parallax sky, glow, particles, oval, capsule, roundedRect, swirl, trees, mushrooms, pipes, arches, etc. The cartridge feeds custom data into those functions. Avoid putting custom "drawPortal()"-style functions in normal cartridges unless intentionally making a trusted custom/hack cartridge.

EXTERNAL CARTRIDGES:
External cartridges use JSON and should normally be named:

something.llmcart.txt

Android file pickers may only expose ".txt" reliably, so ".llmcart.txt" is the current working convention.

Expected cart format:
format: "llmcart-toybox-recipe"
cartVersion: 2

PLACEMENT / CLEANUP CONTRACT:
Generated or draft cartridges should prefer the normal, managed placement path. The loader runs a conservative one-time cleanup pass on external cartridges, after JSON parse and before gameplay reset. Its job is to prevent recurring draft mistakes, not to redesign a finished level.

* Surface props: resourceScenery pipes, trees, shrubs, mushrooms, and arrow signs are treated as surface-bound unless they declare anchor:"raw". The normalizer finds the closest valid walking surface near the prop and places the prop base cleanly on that surface.
* Pipes marked solid:true rebuild their collision from the corrected pipe base.
* Surface props that cannot be placed on a nearby surface are dropped rather than left floating over a chasm. Use anchor:"raw" for intentional weird/floating decorative placement.
* Floating blocks are binary: either their bottom is snapped to the walking surface as a grounded/static block, or their underside is high enough for the big hero plus padding to walk underneath. The forbidden middle zone is normalized away to prevent small-hero-only crawl spaces and big-hero teleport/shove bugs.
* Final hand-authored carts can opt out of all placement cleanup with placement:{autoCleanup:false}; individual objects can opt out with anchor:"raw".

The loader should:

* load from the pause menu
* parse JSON
* validate/normalize expected level fields
* reset gameplay state after loading
* replace world arrays from the external cart
* inherit built-in recipes/audio/resources unless overridden
* avoid leaking demo-only decorative "resourceScenery" into loaded carts unless the loaded cart provides its own
* keep the engine durable; cartridges should not need to understand the whole engine

CURRENT INPUT STATE:
Keyboard:

* arrows / WASD movement
* Space / Up / W jump
* Shift / Z / X run
* P / Escape / Enter pause
* R restart

Default gamepad mapping:

* Left: Button 14
* Right: Button 15
* Up: Button 12
* Down: Button 13
* Run: Button 0
* Jump: Button 1
* Pause/Start: Button 9

Gamepad Learn lives in the pause/status-bar menu. The visible always-on gamepad icon was removed. Tapping/clicking the top status bar opens pause/settings.

CURRENT AUDIO STATE:
RetroCharm SFX are integrated and working. The engine has one shared audio path intended to support future theme music/MIDI work later.

Current built-in SFX hooks include:

* jump
* coin
* star
* bonk
* mushroom emerge
* powerup collect
* enemy stomp
* hurt/shrink/life loss
* level clear

The audio system is intentionally ready for future music, but full MIDI parser/drop-folder/song scheduling is not part of the current baseline.

CURRENT GAMEPLAY STATE:
Current built-in cartridge is the Physics Test Plains / Jump Test style level. It is a known-good gameplay baseline with:

* working run/jump/fall tuning
* standing and running jumps that feel fair
* mushroom powerup block
* big/small player loop
* enemies, stomps, shrink/hurt/lives
* coins and stars
* bonk blocks and messages
* moving/bobbing floating blocks
* portal win condition
* level clear overlay
* signs and speech bubbles
* counters/HUD updating correctly without overlap

Current physics tuning has been validated by play feel. Avoid casual changes to jump/fall/run constants unless deliberately doing a physics pass.

CURRENT VISUAL STATE:
The current hero is a derivative mushroom-cap mascot. It is much stronger than the previous round/helmet/jellybean-headed mascot. Preserve the basic silhouette unless intentionally redesigning.

Grass/dirt rendering lesson:
Grass should not read like a green jellybean sitting on top of dirt. It should overlap/drape onto the dirt like hair over soil. Avoid continuous bright horizontal seam lines at the top of the dirt. If adding new grass details, preserve continuity between the grass cap/lip and the dirt body.

EPS / VECTOR SOURCE WORKFLOW:
EPS files are useful as vector-ish source material, not as runtime assets. Use them to derive:

* silhouettes
* proportions
* color cues
* decorative motifs
* reusable canvas prefab ideas

Do not import giant Illustrator path soup directly into runtime. Do not rely on JPG tracing when a vector source exists. Translate useful source ideas into canvas math / engine prefabs / cartridge recipes.

Attributions live in the pause menu as a pager: one card visible at a time, with previous/next and close controls. Keep it small enough to fit inside the artificial game-screen frame.

IMPORTANT WORKFLOW:
Start from the latest actual file on disk, patch it with code tools, then verify before linking. Extract the script contents and run "node --check" on it. When possible, render a screenshot/headless preview to ensure it is not blank. If screenshot/headless rendering is blocked by the sandbox, say so honestly. Never claim a file exists until it has actually been written and verified.

Use the latest ".htmlz" as the source of truth. Do not reconstruct from memory if the file is available.

USER PREFERENCES:
Keep the work practical and direct. The user values one-file/offline-friendly builds, inspectable code, small durable systems, and the ability to generate or edit cartridges later without grokking the whole engine.

This primer area is a scratchpad. The commented area above cartridges is also a scratchpad. Record important lessons there that are worthy of remembering next time.
-->

<script>
(function(){
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = canvas.width;
const H = canvas.height;
let engineBooted = false;
let lastRuntimeError = '';
function recordRuntimeError(msg){
  const text = String(msg && msg.stack ? msg.stack : msg || 'unknown error');
  lastRuntimeError = text;
  try{ console.log('[LLMario runtime note]', text); }catch(e){}
  let box = document.getElementById('runtimeNote');
  if(!box){
    const panel = document.getElementById('padPanel');
    if(panel){
      box = document.createElement('pre');
      box.id = 'runtimeNote';
      box.style.cssText = 'max-height:88px;overflow:auto;white-space:pre-wrap;color:#ffd0d0;background:#210b13aa;border:1px solid #ff8090;border-radius:8px;padding:6px;font-size:10px;margin-top:8px;';
      panel.appendChild(box);
    }
  }
  if(box) box.textContent = 'Runtime note:\n' + text.slice(0,900);
}
function bootError(msg){
  try{
    const text = String(msg && msg.stack ? msg.stack : msg || 'unknown error');
    try{ console.log('[LLMario boot error]', text); }catch(e){}
    ctx.save();
    ctx.fillStyle = '#8ad8ff';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#06254c';
    ctx.font = '700 18px Verdana,Arial,sans-serif';
    ctx.fillText('LLMario boot error', 28, 44);
    ctx.font = '11px monospace';
    const max = 78;
    const chunks = [];
    for(const raw of text.split('\n').slice(0,6)){
      let line = raw;
      while(line.length > max){ chunks.push(line.slice(0,max)); line = line.slice(max); }
      chunks.push(line);
    }
    for(let i=0;i<Math.min(10,chunks.length);i++) ctx.fillText(chunks[i], 28, 66 + i*14);
    ctx.restore();
  }catch(e){}
}
function shouldIgnoreForeignError(e){
  const fn = String((e && e.filename) || '');
  const msg = String((e && (e.message || e.reason)) || '');
  const st = String((e && e.error && e.error.stack) || (e && e.reason && e.reason.stack) || '');
  const all = (fn + '\n' + msg + '\n' + st).toLowerCase();
  return /moz-extension|chrome-extension|safari-extension|content-script|\/cache\/|\/cac|webextension/.test(all);
}
window.addEventListener('error', e => {
  const where = e.filename ? (' @ '+e.filename.split('/').pop()+':'+e.lineno+':'+e.colno) : '';
  const text = (e.message || e.error || 'unknown error') + where + (e.error && e.error.stack ? '\n'+e.error.stack : '');
  if(engineBooted || shouldIgnoreForeignError(e)) recordRuntimeError(text);
  else bootError(text);
});
window.addEventListener('unhandledrejection', e => {
  const text = e.reason && e.reason.stack ? e.reason.stack : e.reason;
  if(engineBooted || shouldIgnoreForeignError(e)) recordRuntimeError(text);
  else bootError(text);
});

   - high/run bonk block bottom: 115-135 px above the platform top
   - signs should usually sit 60+ px above the nearest walkable top
   - scenery must attach to actual platform tops, not global groundY
   ============================================================ */

  block:{w:42,h:42},
  jump:{standingPeak:112,runningPeak:126,standingGap:[120,145],runningGap:[165,205]},
  vertical:{bonkBottom:[85,115],highBonkBottom:[115,135],signClearance:60},

};

  {
    id:'vecteezy_arcade_scenery_banners_21927855',

    artist:'Erry S. Nugroho',
    source:'Vecteezy',

function normalizeSurfaceArray(cart, report, path, opts){
  const parts = path.split('.');
  let parent = cart;
  for(let i=0;i<parts.length-1;i++) parent = parent && parent[parts[i]];
  const key = parts[parts.length-1];
  if(!parent || !Array.isArray(parent[key])) return;
  const out = [];
  for(const obj of parent[key]){
    if(!isPlainObject(obj)){ out.push(obj); continue; }
    if(obj.anchor === 'raw'){ out.push(obj); continue; }
    if(opts.skip && opts.skip(obj)){ out.push(obj); continue; }
    const info = opts.metrics(obj);
    if(!info || !finiteNumber(info.cx)){ out.push(obj); continue; }
    const place = nearestSurfacePlacement(cart, info.cx, info.halfW || 0, opts.radius == null ? 96 : opts.radius);
    if(!place){
      placementReportPush(report, 'drop', path + ' near x=' + Math.round(info.cx) + ' had no nearby surface');
      continue;
    }
    const targetY = opts.targetY ? opts.targetY(obj, place.y) : place.y;
    const oldY = finiteNumber(info.originalY) ? info.originalY : targetY;

    opts.setY(obj, targetY);
    obj.anchor = obj.anchor || 'surface';
    if(Math.abs(oldY - targetY) > 0.5 || place.dx > 0.5){
      placementReportPush(report, 'fix', path + ' near x=' + Math.round(info.cx) + ' -> surface y=' + Math.round(place.y));
    }
    out.push(obj);

    const cx = (finiteNumber(sign.x) ? sign.x : 0) + w/2;
    const place = nearestSurfacePlacement(cart, cx, w/2, 96);
    if(!place) continue;
    const newX = place.x - w/2;
    const newY = place.y - 58;
    if(Math.abs((sign.x || 0) - newX) > 0.5 || Math.abs((sign.y || 0) - newY) > 0.5){

    const cx = finiteNumber(s.x) ? s.x : 0;

      placementReportPush(report, 'drop', 'image sprite near x=' + Math.round(cx) + ' had no nearby surface');
      s._drop = true;

    }
    const oldX = s.x;
    const oldY = s.y;
    s.x = Math.round(place.x);
    s.y = Math.round(place.y + (finiteNumber(s.yOffset) ? s.yOffset : 0));
    s.anchor = s.anchor || 'surface';
    if(Math.abs((oldX || 0) - s.x) > 0.5 || Math.abs((oldY || 0) - s.y) > 0.5){

function normalizeFloatingBlockPlacements(cart, report){
  if(!Array.isArray(cart.floatingBlocks)) return;
  const bigHeroH = 60;
  const clearancePad = 10;
  for(const b of cart.floatingBlocks){
    if(!isPlainObject(b) || b.anchor === 'raw') continue;
    if(!finiteNumber(b.x) || !finiteNumber(b.y)) continue;
    const h = finiteNumber(b.h) ? b.h : 42;
    const surface = nearestSurfaceUnderBlock(cart, b);
    if(!surface) continue;
    const bottom = b.y + h;
    const surfaceY = surface.y;

    // motion in the clearance budget.  This prevents a block that is safe at
    // its rest y from dipping into the big hero and shoving him sideways.
    const bobDrop = 4;
    const safeBottom = surfaceY - bigHeroH - clearancePad - bobDrop;

    if(Math.abs(bottom - surfaceY) <= 3 || bottom >= surfaceY - 6){

      const dGround = Math.abs(surfaceY - bottom);

      if(dGround <= dOverhead){
        newY = groundTop;
        grounded = true;
      }else{

      }
    }
    if(Math.abs(newY - b.y) > 0.5 || grounded !== !!b.grounded){

        b.grounded = true;
        b.bob = 0;
      }else{

function normalizeCartridgePlacements(cart){

  if(!isPlainObject(cart.resourceScenery)) cart.resourceScenery = {};
  normalizeSurfaceArray(cart, report, 'resourceScenery.pipes', {
    radius:110,
    metrics:p => {
      const s = p.scale || 1, w = 58 * s;
      return {cx:p.x + w/2, halfW:w/2, applyX:p.x + w/2, originalY:p.y};
    },
    setX:(p,cx) => { const w = 58 * (p.scale || 1); p.x = Math.round(cx - w/2); },
    setY:(p,y) => { p.y = Math.round(y); }
  });
  normalizeSurfaceArray(cart, report, 'resourceScenery.trees', {
    radius:110,
    metrics:t => ({cx:t.x, halfW:8 * (t.scale || 1), applyX:t.x, originalY:t.y}),
    setX:(t,cx) => { t.x = Math.round(cx); },
    setY:(t,y) => { t.y = Math.round(y); }
  });
  normalizeSurfaceArray(cart, report, 'resourceScenery.mushrooms', {
    radius:90,
    metrics:m => ({cx:m.x, halfW:14 * (m.scale || 1), applyX:m.x, originalY:m.y}),
    setX:(m,cx) => { m.x = Math.round(cx); },
    setY:(m,y) => { m.y = Math.round(y); }
  });
  normalizeSurfaceArray(cart, report, 'resourceScenery.shrubs', {
    radius:90,
    metrics:s => ({cx:s.x + 14 * (s.scale || 1), halfW:20 * (s.scale || 1), applyX:s.x + 14 * (s.scale || 1), originalY:s.y}),
    setX:(s,cx) => { s.x = Math.round(cx - 14 * (s.scale || 1)); },
    targetY:(s,y) => y - 8 * (s.scale || 1),
    setY:(s,y) => { s.y = Math.round(y); }
  });

  normalizeSignposts(cart, report);

  if(report.fixed || report.dropped){

  }

}

function docFormat(raw){ return raw && typeof raw.format === 'string' ? raw.format : ''; }

function truthForCartAsset(cart, id){
  if(!id || !cart) return null;
  const t = cart.assetTruth;
  if(isPlainObject(t)){
    if(isPlainObject(t.assets) && isPlainObject(t.assets[id])) return t.assets[id];
    if(isPlainObject(t[id])) return t[id];
  }

    const c = truth && isPlainObject(truth.collision) ? truth.collision : null;

        row:p.row,

        x:finiteNumber(p.x) ? p.x : 0,
        y:finiteNumber(p.y) ? p.y : 0,
        w:finiteNumber(p.w) ? p.w : (finiteNumber(def.w) ? def.w : 84),
        h:finiteNumber(p.h) ? p.h : (finiteNumber(def.h) ? def.h : 42),
        anchorX:0,
        anchorY:0,

function normalizeCart(raw){
  if(!isPlainObject(raw)) throw new Error('Cartridge must be a JSON object.');
  if(raw.format && raw.format !== 'llmcart-toybox-recipe') throw new Error('Unsupported cartridge format: '+raw.format);
  const rawHasResourceScenery = Object.prototype.hasOwnProperty.call(raw, 'resourceScenery');
  const cart = mergeCartValue(DEMO_CART, raw);
  cart.format = 'llmcart-toybox-recipe';
  cart.cartVersion = cart.cartVersion || 2;
  convertTruthSlopePlatformsToSprites(cart);
  if(!cart.world || typeof cart.world.width !== 'number' || typeof cart.world.groundY !== 'number') throw new Error('Cartridge missing world.width / world.groundY.');
  if(!cart.playerSpawn || typeof cart.playerSpawn.x !== 'number' || typeof cart.playerSpawn.y !== 'number') throw new Error('Cartridge missing playerSpawn.x / playerSpawn.y.');
  for(const name of ['platforms','floatingBlocks','coins','stars','enemies','signposts']){

  replaceArray(floatingBlocks, cloneData(ACTIVE_CART.floatingBlocks));
  replaceArray(coins, cloneData(ACTIVE_CART.coins).map(c => ({...c,taken:false})));
  replaceArray(stars, cloneData(ACTIVE_CART.stars).map(s => ({...s,taken:false})));
  replaceArray(enemies, cloneData(ACTIVE_CART.enemies).map(e => ({...e,alive:true,flat:0})));

      try{ applyThemeMapIfReady(); return; }
      catch(e){ setToast(['Theme loaded, map not applied', String(e.message || e).slice(0,96)], 280); return; }
    }

    setPaused(false);

  }
  if(isMapDoc(raw)){

    if(ACTIVE_THEME_DOC){

function readFileText(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve({file:file, text:String(reader.result || '')});
    reader.onerror = () => reject(new Error('Read failed: '+(file && file.name || 'file')));
    reader.readAsText(file);
  });
}
function loadCartFiles(fileList){
  const files = Array.from(fileList || []).filter(Boolean);
  if(!files.length) return;
  Promise.all(files.map(readFileText)).then(items => {
    const parsed = items.map(item => {
      let raw;
      try{ raw = JSON.parse(item.text); }
      catch(e){ throw new Error((item.file.name || 'file')+': '+e.message); }
      return {raw:raw, label:item.file.name || 'file'};
    });
    // Themes first, then maps, then legacy carts. Selecting a theme+map together
    // should just work regardless of chooser order.
    parsed.sort((a,b) => {
      const score = x => isThemeDoc(x.raw) ? 0 : (isMapDoc(x.raw) ? 1 : 2);
      return score(a) - score(b);
    });
    for(const item of parsed) applyDoc(item.raw, item.label);
  }).catch(e => setToast(['Load failed', String(e.message || e).slice(0,96)], 280));
}

let padMap = Object.assign({}, DEFAULT_PAD_MAP, storageJSONGet(padMapKey, null) || {});

let learningSnapshot = null;

function composeInput(){
  const oldJump = input.jump;
  const oldPause = input.pause;
  for(const a of ACTIONS) input[a] = !!(keyInput[a] || padInput[a]);
  if(input.jump && !oldJump) input.jumpTap = true;
  if(input.pause && !oldPause) input.pauseTap = true;
}
function buttonLabel(i){ return i == null ? 'unmapped' : 'Button '+i; }
function setPadSeen(text){
  if(!text) return;
  lastPadSeen = text;
  const el = document.getElementById('padSeen');
  if(el) el.textContent = text;
}
function getPads(){
  try{
    const raw = navigator.getGamepads ? navigator.getGamepads() : [];
    return Array.from(raw || []).filter(Boolean);
  }catch(e){
    try{ console.log('[gamepad] getPads failed', e); }catch(_e){}
    return [];
  }
}
function padButtonCount(gp){ return gp && gp.buttons && typeof gp.buttons.length === 'number' ? gp.buttons.length : 0; }
function padButtonPressed(gp, i){
  const b = gp && gp.buttons ? gp.buttons[i] : null;
  if(!b) return false;
  if(typeof b === 'object') return !!b.pressed;
  return !!b;
}

}
function renderPadRows(){
  const rows = document.getElementById('padRows');
  if(!rows) return;
  if(!padMap || typeof padMap !== 'object' || Array.isArray(padMap)) padMap = {...DEFAULT_PAD_MAP};
  rows.innerHTML = '';
  for(const a of ACTIONS){
    const row = document.createElement('div'); row.className = 'padRow';
    const left = document.createElement('div'); left.className = 'padAction'; left.textContent = ACTION_LABELS[a];
    const mid = document.createElement('div'); mid.className = 'padBind'; mid.textContent = buttonLabel(padMap[a]);
    const btn = document.createElement('button'); btn.className = 'learnBtn' + (learningAction===a ? ' learning' : ''); btn.textContent = learningAction===a ? 'Press...' : 'Learn';
    btn.onclick = function(ev){ try{ if(ev && ev.preventDefault) ev.preventDefault(); startPadLearn(a); }catch(err){ recordRuntimeError(err); } };
    row.appendChild(left); row.appendChild(mid); row.appendChild(btn); rows.appendChild(row);
  }
  const seen = document.getElementById('padSeen');
  if(seen) seen.textContent = lastPadSeen || '';
}
function savePadMap(){
  if(!padMap || typeof padMap !== 'object' || Array.isArray(padMap)) padMap = {...DEFAULT_PAD_MAP};
  storageJSONSet(padMapKey, padMap);
}
function clearPadMap(){ padMap = {...DEFAULT_PAD_MAP}; learningAction=''; learningSnapshot=null; savePadMap(); renderPadRows(); }
function startPadLearn(action){
  learningAction = action;
  try{
    learningSnapshot = snapshotPadButtons();
    const gp = getPads()[0];
    if(gp) setPadSeen(gp.id || 'Gamepad connected');
  }catch(e){
    try{ console.log('[gamepad] learn setup failed', e); }catch(_e){}
    learningSnapshot = [];
  }
  renderPadRows();
}
function finishPadLearn(buttonIndex){
  if(!learningAction) return;
  if(!padMap || typeof padMap !== 'object' || Array.isArray(padMap)) padMap = {...DEFAULT_PAD_MAP};
  for(const a of ACTIONS){ if(a !== learningAction && padMap[a] === buttonIndex) delete padMap[a]; }
  padMap[learningAction] = buttonIndex;
  learningAction = '';
  learningSnapshot = null;
  savePadMap();
  renderPadRows();
}
function pollGamepad(){
  for(const a of ACTIONS) padInput[a] = false;
  const gp = getPads()[0];
  if(!gp) return;
  const n = padButtonCount(gp);
  for(let i=0;i<n;i++){
    if(padButtonPressed(gp,i)){ setPadSeen(gp.id || 'Gamepad connected'); break; }
  }
  if(learningAction){
    for(let i=0;i<n;i++){
      const now = padButtonPressed(gp,i);
      const was = !!(learningSnapshot && learningSnapshot[i]);
      if(now && !was){ finishPadLearn(i); break; }
    }
  }
  for(const a of ACTIONS){
    const bi = padMap[a];
    padInput[a] = bi != null && padButtonPressed(gp, bi);
  }
}

function onKey(e, down){
  if(down) unlockAudio();
  const k = e.key.toLowerCase();
  if(k === 'arrowleft' || k === 'a') keyInput.left = down;
  if(k === 'arrowright' || k === 'd') keyInput.right = down;
  if(k === 'arrowdown' || k === 's') keyInput.down = down;
  if(k === 'shift' || k === 'z' || k === 'x') keyInput.run = down;
  if(k === 'arrowup' || k === 'w') keyInput.up = down;
  if(k === 'arrowup' || k === 'w' || k === ' '){
    keyInput.jump = down;
    e.preventDefault();
  }
  if((k === 'shift' || k === 'z' || k === 'x' || k === 'arrowdown') && down) e.preventDefault();
  if(k === 'p' || k === 'escape' || k === 'enter'){
    keyInput.pause = down;
    e.preventDefault();
  }
  if(down && k === 'r') reset(true);
  composeInput();
}

function rr(x,y,w,h,r,fill,stroke,lineWidth){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  if(fill){ ctx.fillStyle = fill; ctx.fill(); }
  if(stroke){ ctx.lineWidth = lineWidth || 1; ctx.strokeStyle = stroke; ctx.stroke(); }
}
function rrClip(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  ctx.clip();
}

function shadowText(t, x, y, size, fill, align){
  ctx.font = '700 '+size+'px Verdana, Arial, sans-serif';
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#00152c';
  ctx.fillText(t, x+2, y+2);
  ctx.fillStyle = fill;
  ctx.fillText(t, x, y);
}

function starPath(x,y,r1,r2,pts){
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const a = -Math.PI/2 + i*Math.PI/pts;
    const r = i % 2 ? r2 : r1;
    const px = x + Math.cos(a)*r;
    const py = y + Math.sin(a)*r;
    if(i === 0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
}

function aabb(a,b){

function findPlayerEntryPipe(){
  if(!input.down || player.pipeCooldown > 0 || !player.onGround) return null;
  const cx = player.x + player.w * 0.5;
  const feet = player.y + player.h;
  for(const p of (((ACTIVE_CART.resourceScenery || {}).pipes) || [])){
    const target = pipeTravelTarget(p);
    if(!target) continue;
    const r = sceneryPipeSolid(p);
    const margin = Math.max(6, r.w * 0.18);
    const centered = cx >= r.x + margin && cx <= r.x + r.w - margin;
    const onLip = Math.abs(feet - r.y) <= 7 && player.vy >= -0.25;

function isClimbCollisionKind(k){

  const tag = String(s.kind || s.type || s.role || '').toLowerCase();

function climbSpriteFrame(s){
  const f = imageSpriteFrame(s);

  const h = finiteNumber(s && s.h) ? s.h : 168;

function climbZoneColumns(){

  zones.sort((a,b)=> (a.rect.x + a.rect.w*0.5) - (b.rect.x + b.rect.w*0.5) || a.rect.y - b.rect.y);

function updateBlockBursts(){
  for(let i=blockBursts.length-1;i>=0;i--){
    const p = blockBursts[i];
    p.life -= 1;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.24;
    p.rot += p.vr;
    if(p.life <= 0) blockBursts.splice(i,1);
  }
}
function drawBlockBurst(p){
  if(!p || p.life <= 0) return;
  const x = worldX(p.x), y = p.y;
  if(x < -40 || x > W+40 || y < -80 || y > worldHeight()+80) return;
  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, p.life / 22));
  ctx.translate(Math.round(x), Math.round(y));
  ctx.rotate(p.rot || 0);
  ctx.fillStyle = p.color || '#b67d4c';
  ctx.fillRect(Math.round(-p.w/2), Math.round(-p.h/2), Math.round(p.w), Math.round(p.h));
  ctx.strokeStyle = p.edge || '#5e3317';
  ctx.lineWidth = 1;
  ctx.strokeRect(Math.round(-p.w/2)+.5, Math.round(-p.h/2)+.5, Math.max(1, Math.round(p.w)-1), Math.max(1, Math.round(p.h)-1));
  ctx.restore();
}

function update(){
  tick += 1;
  sparkleTick += 1;
  pollGamepad();
  composeInput();
  if(input.pauseTap){
    input.pauseTap = false;
    if(!won && !player.deadTimer) togglePause();
  }
  if(paused){
    input.jumpTap = false;
    if(shake > 0) shake *= 0.84;
    updatePausePanel();
    return;
  }
  if(shake > 0) shake *= 0.84;
  for(const b of floatingBlocks) b.prevY = currentBlockY(b);
  floatingBlocks.forEach(b => { if(b.busted) return; b.bob += 0.045; if(b.bump > 0) b.bump -= 1; });
  // Carry the player on one best supporting bobbing block only.  At seams,
  // overlapping two blocks used to apply carry twice and encourage the
  // horizontal solver to shove the player across the row.
  let carryBlock = null, carryOverlap = 0;
  if(player.onGround && player.vy >= 0){
    const feet = player.y + player.h;
    for(const b of floatingBlocks){
      if(b.busted) continue;
      const oldY = b.prevY == null ? b.y : b.prevY;
      const overlap = Math.min(player.x+player.w, b.x+b.w-3) - Math.max(player.x, b.x+3);
      if(overlap > carryOverlap && Math.abs(feet - oldY) < 5){
        carryBlock = b;
        carryOverlap = overlap;
      }
    }
  }
  if(carryBlock){
    const oldY = carryBlock.prevY == null ? carryBlock.y : carryBlock.prevY;
    const newY = currentBlockY(carryBlock);
    player.y += newY - oldY;
  }
  if(player.inv > 0) player.inv -= 1;
  if(player.pipeCooldown > 0) player.pipeCooldown -= 1;

  if(player.deadTimer > 0){
    player.deadTimer -= 1;
    player.vy += 0.42;
    player.y += player.vy;
    if(player.deadTimer === 1){
      if(player.lives < 0) reset(true);
      else reset(false);
    }
    return;
  }

  if(won){
    player.vx *= 0.86;
    player.vy += 0.28;
    resolvePlayer();
    return;
  }

  if(applyRowTransitionLock()){
    input.jumpTap = false;
    let targetCam = player.x - 210;
    if(targetCam < 0) targetCam = 0;
    if(targetCam > WORLD_W - W) targetCam = WORLD_W - W;
    cam += (targetCam - cam) * 0.08;
    return;
  }

  const pipeHit = findPlayerEntryPipe();
  if(pipeHit && enterPipeTravel(pipeHit)){
    input.jumpTap = false;
    input.down = false;
  }

  let climbZone = findPlayerClimbZone();
  if(player.climbing && input.jumpTap){
    leaveClimb();
    playSfx('jump');
    player.vy = -8.7;
    if(input.left){ player.vx = -2.4; player.face = -1; }
    else if(input.right){ player.vx = 2.4; player.face = 1; }
    else player.vx = player.face * 1.2;
  }
  if(player.climbing && !climbZone) leaveClimb();
  if(!player.climbing && climbZone && (input.up || input.down)) enterClimb(climbZone);

  if(player.climbing){
    updatePlayerClimb(climbZone || findPlayerClimbZone());
    input.jumpTap = false;
  }else{
    const running = !!input.run;
    const accel = running ? 0.50 : 0.36;
    const max = running ? 4.35 : 2.95;
    const friction = player.onGround ? (running ? 0.84 : 0.78) : 0.96;
    if(input.left){ player.vx -= accel; player.face = -1; }
    if(input.right){ player.vx += accel; player.face = 1; }
    if(!input.left && !input.right) player.vx *= friction;
    if(player.vx > max) player.vx = max;
    if(player.vx < -max) player.vx = -max;

    if(input.jumpTap && player.onGround){
      playSfx('jump');
      const runSpeed = Math.abs(player.vx);
      const runJumpBonus = (input.run && runSpeed > 2.4) ? Math.min(1.0, (runSpeed - 2.4) * 0.42) : 0;
      player.vy = -11.15 - runJumpBonus;
      player.onGround = false;
    }
    input.jumpTap = false;

    if(!input.jump && player.vy < -4.1) player.vy = -4.1;
    const rowStall = applyRowFallStall();
    if(rowStall){
      player.vy += rowCameraConfig().stallGravity || 0.08;
      player.vy = Math.min(player.vy, rowCameraConfig().stallMaxVy || 1.35);
    }else{
      player.vy += 0.52;
      if(player.vy > 11.2) player.vy = 11.2;
    }
    resolvePlayer();
  }
  updatePowerups();
  updateCoinBursts();
  updateBlockBursts();

  if(player.y > worldDeathY()) loseLife();
  if(player.x < 0) player.x = 0;
  if(player.x > WORLD_W - player.w) player.x = WORLD_W - player.w;

  const enemyHits = [];
  const stompVy = player.vy;
  for(const e of enemies){
    if(!e.alive){ if(e.flat > 0) e.flat -= 1; continue; }
    e.x += e.vx;
    if(e.x < e.min || e.x > e.max){ e.vx *= -1; e.x += e.vx * 2; }
    if(aabb(player,e)) enemyHits.push(e);
  }
  if(enemyHits.length){
    const stompHits = enemyHits.filter(e => stompVy > 1 && player.y + player.h - e.y < 16);
    if(stompHits.length){
      for(const e of stompHits) stompEnemy(e);
      player.vy = -8.6;
    }else hurtPlayer();
  }

  collectables();

  if(aabb(player, portal)){
    playSfx('clear');
    won = true;
    updatePausePanel();
    closePadPanel();
    closeAttribPanel();
    best = Math.max(best, player.coins + player.stars * 10);
    storageSet(saveKey, best);
  }

  let targetCam = player.x - 210;
  if(targetCam < 0) targetCam = 0;
  if(targetCam > WORLD_W - W) targetCam = WORLD_W - W;
  cam += (targetCam - cam) * 0.08;
  updateRowCameraState();
}

function drawImageRepeated(img, dx, dy, dw, dh, xFactor, alpha, smooth){
  const oldSmooth = ctx.imageSmoothingEnabled;
  const oldAlpha = ctx.globalAlpha;
  ctx.imageSmoothingEnabled = !!smooth;
  if(alpha != null) ctx.globalAlpha = oldAlpha * alpha;
  const span = Math.max(1, dw);
  const off = ((cam * (xFactor || 0)) % span + span) % span;
  for(let x = dx - off - span; x < W + span; x += span){
    ctx.drawImage(img, Math.round(x), Math.round(dy), Math.ceil(dw), Math.ceil(dh));
  }
  ctx.globalAlpha = oldAlpha;
  ctx.imageSmoothingEnabled = oldSmooth;
}
function prefabImageSky(r){
  const top = r.fallbackTop || '#8ee8ff';
  const bottom = r.fallbackBottom || '#d9fff1';
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, top); g.addColorStop(1, bottom);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
  const layers = Array.isArray(r.layers) ? r.layers : [];
  for(const l of layers){
    const img = cartImage(l.image || l.id);
    if(!img) continue;
    let dw, dh;
    if(l.fit === 'cover'){
      const sc = Math.max(W / img.width, H / img.height) * (l.scale || 1);
      dw = img.width * sc; dh = img.height * sc;
    }else if(l.fit === 'width'){
      const sc = (W / img.width) * (l.scale || 1);
      dw = img.width * sc; dh = img.height * sc;
    }else if(l.w && l.h){
      dw = l.w; dh = l.h;
    }else{
      const sc = l.scale || 1;
      dw = img.width * sc; dh = img.height * sc;
    }
    const y = l.y == null ? (H - dh) : l.y;
    if(l.repeatX === false){
      const oldSmooth = ctx.imageSmoothingEnabled;
      const oldAlpha = ctx.globalAlpha;
      ctx.imageSmoothingEnabled = !!l.smooth;
      if(l.alpha != null) ctx.globalAlpha = oldAlpha * l.alpha;
      ctx.drawImage(img, Math.round(l.x || 0), Math.round(y), Math.ceil(dw), Math.ceil(dh));
      ctx.globalAlpha = oldAlpha;
      ctx.imageSmoothingEnabled = oldSmooth;
    }else{
      drawImageRepeated(img, l.x || 0, y, dw, dh, l.xFactor == null ? 0.04 : l.xFactor, l.alpha, l.smooth !== false);
    }
  }
}
function drawImageTile(id, x, y, w, h, smooth){
  const img = cartImage(id);
  if(!img) return false;
  const oldSmooth = ctx.imageSmoothingEnabled;
  ctx.imageSmoothingEnabled = !!smooth;
  ctx.drawImage(img, Math.round(x), Math.round(y), Math.ceil(w), Math.ceil(h));
  ctx.imageSmoothingEnabled = oldSmooth;
  return true;
}
function prefabImageTilePlatform(r,p){
  const x = worldX(p.x);
  const y = p.y;
  if(x > W + 96 || x + p.w < -96) return;
  const ts = r.tileSize || 32;
  const tiles = r.tiles || {};
  const seam = r.overlap == null ? 1 : Math.max(0, r.overlap);
  if(r.shadow !== false) drawGroundShadow(x, y, p.w, p.h);
  ctx.save();
  ctx.beginPath(); ctx.rect(Math.round(x), Math.round(y), Math.round(p.w), Math.round(p.h)); ctx.clip();
  // Some OpenGameArt tiles have transparent gutters at their edges.  When
  // scaled onto our physics rectangles, those gutters can reveal the sky and
  // make solid terrain read like spaced construction blocks.  Paint a dirt
  // backing first, then let image tiles slightly overdraw inside the clipped
  // platform.  Collision geometry remains exactly p.x/p.y/p.w/p.h.
  ctx.fillStyle = r.backFill || r.fallbackDirt || '#5f3c25';
  ctx.fillRect(Math.round(x), Math.round(y), Math.ceil(p.w), Math.ceil(p.h));
  const cols = Math.max(1, Math.ceil(p.w / ts));
  const rows = Math.max(1, Math.ceil(p.h / ts));
  for(let row=0; row<rows; row++){
    for(let col=0; col<cols; col++){
      const xx = x + col * ts;
      const yy = y + row * ts;
      const ww = Math.min(ts, x + p.w - xx);
      const hh = Math.min(ts, y + p.h - yy);
      let id;
      if(row === 0){
        id = col === 0 ? tiles.topLeft : (col === cols-1 ? tiles.topRight : tiles.topMid);
      }else if(row === rows-1 && rows > 2){
        id = col === 0 ? (tiles.bottomLeft || tiles.midLeft) : (col === cols-1 ? (tiles.bottomRight || tiles.midRight) : (tiles.bottomMid || tiles.mid));
      }else{
        id = col === 0 ? (tiles.midLeft || tiles.mid) : (col === cols-1 ? (tiles.midRight || tiles.mid) : tiles.mid);
      }
      const dx = xx - (col > 0 ? seam : 0);
      const dy = yy - (row > 0 ? seam : 0);
      const dw = ww + (col > 0 ? seam : 0) + (col < cols-1 ? seam : 0);
      const dh = hh + (row > 0 ? seam : 0) + (row < rows-1 ? seam : 0);
      if(!drawImageTile(id || tiles.mid || tiles.topMid, dx, dy, dw, dh, r.smooth)){
        ctx.fillStyle = row === 0 ? (r.fallbackTop || '#6abf28') : (r.fallbackDirt || '#6b442d');
        ctx.fillRect(Math.round(xx), Math.round(yy), Math.ceil(ww), Math.ceil(hh));
      }
    }
  }
  ctx.restore();
}

function drawDefaultLadderFrame(f,s){
  const x = worldX(f.x), y = f.y;
  if(x > W + 80 || x + f.w < -80) return;
  const oldAlpha = ctx.globalAlpha;
  if(s && s.alpha != null) ctx.globalAlpha = oldAlpha * s.alpha;
  const left = Math.round(x + f.w * 0.24) + .5;
  const right = Math.round(x + f.w * 0.76) + .5;
  const top = Math.round(y) + .5;
  const bottom = Math.round(y + f.h) + .5;
  ctx.lineWidth = Math.max(3, Math.round(f.w * 0.11));
  ctx.strokeStyle = '#7a4a22';
  ctx.beginPath(); ctx.moveTo(left, top); ctx.lineTo(left, bottom); ctx.moveTo(right, top); ctx.lineTo(right, bottom); ctx.stroke();
  ctx.lineWidth = Math.max(2, Math.round(f.h * 0.012));
  ctx.strokeStyle = '#d2b071';
  const step = Math.max(14, Math.min(26, f.h / 7));
  for(let yy = y + step * .55; yy < y + f.h - 4; yy += step){
    ctx.beginPath(); ctx.moveTo(Math.round(x + f.w * 0.18)+.5, Math.round(yy)+.5); ctx.lineTo(Math.round(x + f.w * 0.82)+.5, Math.round(yy)+.5); ctx.stroke();
  }
  ctx.globalAlpha = oldAlpha;
}
function drawImageSprite(s){
  if(!s || s.hidden) return;
  const f = imageSpriteFrame(s);
  const img = f && (f.img || cartImage(f.id));
  if(!f) return;
  if(!img){ if(spriteLooksClimbable(s)) drawDefaultLadderFrame(f,s); return; }
  const x = worldX(f.x);
  const y = f.y;
  if(x > W + 180 || x + f.w < -180) return;
  const oldSmooth = ctx.imageSmoothingEnabled;
  const oldAlpha = ctx.globalAlpha;
  ctx.imageSmoothingEnabled = s.smooth !== false;
  if(s.alpha != null) ctx.globalAlpha = oldAlpha * s.alpha;
  ctx.drawImage(img, Math.round(x), Math.round(y), Math.round(f.w), Math.round(f.h));
  ctx.globalAlpha = oldAlpha;
  ctx.imageSmoothingEnabled = oldSmooth;
}
function drawImageSceneryLayer(layer){
  const data = ACTIVE_CART.resourceScenery || {};
  for(const s of (data.sprites || [])) if((s.layer || 'front') === layer) drawImageSprite(s);
}
function backgroundMode(){
  const b = ACTIVE_CART && ACTIVE_CART.background;
  return b && (b.mode || b.kind) || 'all';
}
function drawSky(){
  if(backgroundMode() === 'surface-underground'){
    const rows = worldRows();
    const top = rows[0];
    const topY = top ? top.cameraY : 0;
    const nextY = rows[1] ? rows[1].cameraY : Infinity;
    // Top row gets the theme sky. Lower rows get plain black, matching classic underground language.
    if(ROW_CAM && ROW_CAM.active > 0 || camY >= nextY - 1){
      ctx.fillStyle = '#050607';
      ctx.fillRect(0,0,W,H);
      return;
    }
    // During tiny camera offsets near the top row, keep the normal sky.
    if(camY <= topY + 2){ drawRecipe('sky'); return; }
  }
  drawRecipe('sky');
}
function prefabToySky(r){
  const grad = r.gradient || ['#69c8ff','#9be3ff','#c3f1ff'];
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, grad[0]);
  g.addColorStop(0.56, grad[1] || grad[0]);
  g.addColorStop(1, grad[2] || grad[1] || grad[0]);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  if(r.arcadeWaveBands && r.arcadeWaveBands.enabled) drawArcadeWaveBands(r.arcadeWaveBands);
  for(const layer of (r.cloudLayers || [])) drawCloudLayer(cam*(layer.offset||0), layer.spacing||1, layer.scale||1, r.cloud||{});
  for(const m of (r.mountains || [])) drawMountainLayer(cam*(m.offset||0), m.front, m.edge, m.baseY, m.heights, m.windows);
  if(r.pillLayer) drawPillLayer(cam*(r.pillLayer.offset||0), r.pillLayer);

  const tw = r.twinkles || {};
  const count = tw.count || 0;
  for(let i=0;i<count;i++){
    const sx = (i*101 - cam*0.08) % (W+140) - 70;
    const sy = 80 + (i%3)*36;
    ctx.fillStyle = tw.color || 'rgba(255,255,255,0.15)';
    ctx.fillRect(Math.floor(sx), sy, 3, 3);
    ctx.fillRect(Math.floor(sx+16), sy+9, 2, 2);
  }
}
function drawCloudLayer(offset, spacingScale, sizeScale, cloudRecipe){
  const base = [[70,62,0.95],[190,104,0.72],[314,70,1.05],[430,98,0.82],[560,76,1.04],[690,112,0.75],[820,66,1.08]];
  ctx.save();
  ctx.translate(offset,0);
  for(let k=-1;k<3;k++) for(const item of base) drawCloud(item[0]+k*780*spacingScale,item[1],item[2]*sizeScale,cloudRecipe);
  ctx.restore();
}
function drawCloud(x,y,s,r){
  ctx.save();
  ctx.translate(Math.round(x),Math.round(y));
  ctx.fillStyle = r.fill || '#f6ffff';
  ctx.strokeStyle = r.edge || '#caeefb';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(-25*s, 6*s, 18*s, Math.PI*0.8, Math.PI*1.98);
  ctx.arc(-6*s, -2*s, 21*s, Math.PI, Math.PI*2);
  ctx.arc(17*s, 0, 18*s, Math.PI, Math.PI*2);
  ctx.arc(34*s, 7*s, 14*s, Math.PI, Math.PI*2);
  ctx.lineTo(44*s, 18*s); ctx.lineTo(-40*s, 18*s); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = r.shine || '#ffffff';
  ctx.fillRect(-24*s, 10*s, 40*s, 4*s);
  ctx.restore();
}
function drawMountainLayer(offset, front, edge, baseY, heights, windowColor){
  ctx.save(); ctx.translate(offset,0);
  let x = -40;
  for(let i=0;i<heights.length+8;i++){
    const w = 90 + (i%3)*24;
    const h = heights[i % heights.length];
    const stemH = h + 50;
    rr(x, baseY-stemH, w, stemH, Math.min(34,w*0.25), front, edge, 2);
    ctx.fillStyle = windowColor || '#cfffff';
    ctx.fillRect(Math.round(x+w*0.28), Math.round(baseY-stemH+20), 6, 6);
    ctx.fillRect(Math.round(x+w*0.56), Math.round(baseY-stemH+46), 6, 6);
    x += w - 14;
  }
  ctx.restore();
}
function drawPillLayer(offset, r){
  ctx.save(); ctx.translate(offset,0);
  const pills = [{x:0,w:70,h:116},{x:92,w:46,h:84},{x:160,w:66,h:138},{x:244,w:52,h:92},{x:322,w:74,h:154},{x:420,w:48,h:98},{x:500,w:70,h:126},{x:592,w:50,h:86},{x:660,w:72,h:150},{x:756,w:54,h:104},{x:838,w:64,h:132},{x:928,w:48,h:90}];
  for(let row=0;row<4;row++) for(let i=0;i<pills.length;i++){
    const p = pills[i], x = p.x+row*980, y = 330, h = p.h;
    const g = ctx.createLinearGradient(0,y-h,0,y);
    g.addColorStop(0,r.top||'#a3ebff'); g.addColorStop(1,r.bottom||'#73d2f5');
    rr(x,y-h,p.w,h,24,g,r.edge||'#6cc8ee',2);
    ctx.fillStyle = r.window || '#cfffff';
    ctx.fillRect(Math.round(x+p.w*0.32), Math.round(y-h+16), 6, 7);
    if(i%2===0) ctx.fillRect(Math.round(x+p.w*0.54), Math.round(y-h+40), 6, 7);
  }
  ctx.restore();
}

function drawArcadeWaveBands(r){
  const ys = r.ys || [90,150,215,280];
  const colors = r.colors || ['#1f70b5','#1b8fd4','#6dd0ff'];
  const amp = r.amp || 8;
  const wave = r.wave || 54;
  const off = cam * (r.offset || -0.07);
  ctx.save();
  ctx.globalAlpha = r.alpha == null ? 0.15 : r.alpha;
  for(let row=0; row<ys.length; row++){
    const y = ys[row];
    ctx.fillStyle = colors[row % colors.length];
    ctx.beginPath();
    ctx.moveTo(-20,y+amp);
    for(let x=-20; x<=W+40; x+=wave){
      const xx = x + (off % wave);
      ctx.quadraticCurveTo(xx + wave*.25, y-amp, xx + wave*.5, y+amp);
      ctx.quadraticCurveTo(xx + wave*.75, y+amp*2, xx + wave, y+amp);
    }
    ctx.lineTo(W+40,y+amp*2+15);
    ctx.lineTo(-20,y+amp*2+15);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}
function drawArcadePipe(x, baseY, h, scale, r){
  const sx = Math.round(worldX(x));
  const s = scale || 1;
  const w = 58*s;
  const lipH = 23*s;
  const bodyH = h || 86*s;
  const y = baseY - bodyH;
  if(sx > W + 100 || sx + w < -100) return;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.fillRect(Math.round(sx+6*s), Math.round(baseY-5*s), Math.round(w-8*s), Math.round(8*s));
  const bodyG = ctx.createLinearGradient(0,y,0,baseY);
  bodyG.addColorStop(0,r.mid||'#6fd000');
  bodyG.addColorStop(1,r.dark||'#2f8900');
  rr(sx+8*s, y+lipH*.62, w-16*s, bodyH-lipH*.42, 5*s, bodyG, r.edge||'#2a7b00', 2);
  const lipG = ctx.createLinearGradient(0,y,0,y+lipH);
  lipG.addColorStop(0,r.hi||'#a2f042');
  lipG.addColorStop(.6,r.rim||'#84df17');
  lipG.addColorStop(1,r.dark||'#2f8900');
  rr(sx, y, w, lipH, 5*s, lipG, r.edge||'#2a7b00', 2);
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.fillRect(Math.round(sx+13*s), Math.round(y+5*s), Math.max(2,Math.round(4*s)), Math.round(bodyH-12*s));
  ctx.fillStyle = 'rgba(0,60,0,0.25)';
  ctx.fillRect(Math.round(sx+w-15*s), Math.round(y+3*s), Math.max(2,Math.round(5*s)), Math.round(bodyH-7*s));
  ctx.restore();
}
function drawArcadeArch(a, r){
  const x = worldX(a.x), y = a.y;
  if(x > W + 100 || x + a.w < -100) return;
  ctx.save();
  ctx.fillStyle = a.color || '#ff8ea8';
  ctx.strokeStyle = r.edge || '#e55c7a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.quadraticCurveTo(x+a.w*.50, y-a.h*.92, x+a.w, y);
  ctx.lineTo(x+a.w, y+34);

function drawFlowers(){
  const fr = recipe('scenery.flowers');
  const colors = fr.colors || ['#e2fcff','#ffd9fb','#ffe778','#a7f8ff'];
  let n = 0;
  for(const p of platforms){
    const step = p.w > 180 ? 58 : 52;
    const start = p.x + 22;
    const end = p.x + p.w - 20;
    for(let fx=start; fx<end; fx+=step){
      const seed = Math.abs(Math.floor((fx*17 + p.y*13 + p.w*7) % 101));
      if(seed < 22) continue;
      // Keep flowers on the actual top surface of the platform.  This
      // avoids the old global-ground row that passed through air/earth.
      const sx = worldX(fx);
      if(sx < -24 || sx > W+24) continue;
      const baseY = p.y + 2;
      const h = 9 + (seed % 4);
      ctx.fillStyle = fr.stem || '#1a7e37';
      ctx.fillRect(Math.round(sx), baseY-h, 2, h);
      ctx.fillStyle = colors[n % colors.length];
      ctx.fillRect(Math.round(sx-2), baseY-h-5, 6, 6);
      ctx.fillStyle = fr.shine || 'rgba(255,255,255,0.45)';
      ctx.fillRect(Math.round(sx), baseY-h-3, 2, 2);
      n++;
    }
  }
}

  shadowText(label2, bx+10, by+21, 11, '#aef8ff');
  ctx.restore();
  coordProbe.ttl--;
}

function drawOverlay(){
  const r = recipe('overlay');
  if(paused && !won){
    rr(250,126,288,100,12,r.panel||'rgba(5,22,41,0.9)',r.edge||'#68f2ff',3);
    shadowText('PAUSED', W/2, 146, 32, r.title||'#ffe766', 'center');
    shadowText('Resume, load cartridges, or open Gamepad Learn.', W/2, 188, 14, r.text||'#efffff', 'center');
    return;
  }
  if(messageTimer > 0 && !won) messageTimer -= 1;
  if(won){
    rr(210,110,366,114,12,r.panel||'rgba(5,22,41,0.9)',r.edge||'#68f2ff',3);
    shadowText('LEVEL CLEAR!', W/2, 130, 34, r.title||'#ffe766', 'center');
    shadowText(ACTIVE_CART.messages.win || 'Cartridge cleared.', W/2, 172, 18, r.text||'#efffff', 'center');
    shadowText('Press R to replay.', W/2, 195, 16, r.sub||'#9ef7ff', 'center');
  }else if(messageTimer > 0){
    ctx.save(); ctx.globalAlpha = Math.min(1,messageTimer/40);
    rr(246,62,296,34,10,r.toast||'rgba(12,39,69,0.8)',r.toastEdge||'#5feaff',2);
    const lines = toastLines || ACTIVE_CART.messages.welcome || ['Welcome'];
    shadowText(lines[0], W/2, 67, 14, r.text||'#efffff', 'center');
    if(lines[1]) shadowText(lines[1], W/2, 81, 12, r.sub||'#9ef7ff', 'center');
    ctx.restore();
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const sx = (Math.random()-0.5) * shake;
  const sy = (Math.random()-0.5) * shake;
  ctx.save();
  ctx.translate(Math.round(sx), Math.round(sy));

  drawSky();
  ctx.save();
  ctx.translate(0, -Math.round(camY));
  drawResourceSceneryBack();
  for(const sign of signposts){
    if(sign.kind === 'arrow') drawArrowSign(sign.x, sign.y);
    else if(sign.kind === 'bubble') drawSpeechSign(sign);
  }
  drawPortal();
  drawFloatingBlocks();
  platforms.forEach(drawPlatform);
  coins.forEach(drawCoin);
  coinBursts.forEach(drawCoinBurst);
  blockBursts.forEach(drawBlockBurst);
  stars.forEach(drawStar);
  powerups.forEach(drawPowerup);
  drawFlowers();
  enemies.forEach(drawBlob);
  drawSceneryFront();
  drawPlayer();
  drawSceneryForeground();

  ctx.restore();
  drawRowCameraOverlay();
  ctx.restore();
  drawHUD();
  drawOverlay();
  drawCoordProbe();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
engineBooted = true;
loop();
})();
</script>
</body>
</html>
